<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>بلاگ | دایمند ماین</title>
    <meta name="description" content="مقالات و آموزش‌های تخصصی ماینکرفت - راهنمای ماب‌ها، بایوم‌ها و آیتم‌های بازی">
    <meta name="keywords" content="ماینکرفت, بلاگ ماینکرفت, آموزش ماینکرفت, ماب ماینکرفت, بایوم ماینکرفت">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/Not-Found4/DiamondMine@main/images/ii.png">
    <link rel="stylesheet" href="Main.css">
    <link rel="stylesheet" href="blog.css">
</head>
<body>

    <div class="bg-tilt" id="bgTilt"></div>
    <div class="blur-overlay"></div>

    <header>
        <div class="logo-area">
            <img src="https://cdn.jsdelivr.net/gh/Not-Found4/DiamondMine@main/images/ii.png" alt="لوگو">
            <div class="logo-text">
                <div class="en">DiamondMine</div>
                <div class="fa">دایمند ماین</div>
            </div>
        </div>
        
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="nav-menu" id="navMenu">
            <a href="index.html">خانه</a>
            <a href="blog.html" class="active">وبلاگ</a>
            <a href="about.html">درباره ما</a>
            <a href="index.html#gamemodes">گیم مودها</a>
            <a href="#" class="nav-btn">ورود / ثبت‌نام</a>
        </div>
    </header>

    <div class="blog-header">
        <h1>📖 بلاگ دایمند ماین</h1>
        <p>مقالات تخصصی ماینکرفت | راهنماهای ماب‌ها، بایوم‌ها و آیتم‌های نادر</p>
    </div>

    <div class="blog-grid" id="blogGrid"></div>

    <div class="pagination" id="pagination"></div>

    <script>
        const blogPosts = [
            { title: "کریپر (Creeper)", category: "ماب", desc: "ماب انفجاری که در شب ظاهر می‌شود. اگر نزدیک شوی، منفجر می‌شود.", emoji: "💥", stat: "دشمن" },
            { title: "اندرمن (Enderman)", category: "ماب", desc: "ماب بلند و سیاه که با نگاه کردن عصبانی می‌شود. اندرپیرل می‌دهد.", emoji: "👾", stat: "خنثی/دشمن" },
            { title: "اسکلتون (Skeleton)", category: "ماب", desc: "ماب تیرانداز با کمان. استخوان و تیر می‌دهد.", emoji: "🏹", stat: "دشمن" },
            { title: "زامبی (Zombie)", category: "ماب", desc: "ماب کند اما خطرناک. به روستاییان حمله می‌کند.", emoji: "🧟", stat: "دشمن" },
            { title: "عنکبوت (Spider)", category: "ماب", desc: "از دیوارها بالا می‌رود. در شب چشم‌هایش قرمز می‌شود.", emoji: "🕷️", stat: "دشمن" },
            { title: "جادوگر (Witch)", category: "ماب", desc: "از معجون استفاده می‌کند. در کلبه‌های مرداب زندگی می‌کند.", emoji: "🧙", stat: "دشمن" },
            { title: "اسلایم (Slime)", category: "ماب", desc: "ماب ژله‌ای در باتلاق‌ها. با کشتنش تقسیم می‌شود.", emoji: "🟢", stat: "دشمن" },
            { title: "بلیز (Blaze)", category: "ماب", desc: "ماب آتشی در ندر. راود بلز می‌دهد.", emoji: "🔥", stat: "دشمن" },
            { title: "غول (Ghast)", category: "ماب", desc: "ماب پرنده در ندر. توپ‌های آتشی شلیک می‌کند.", emoji: "👻", stat: "دشمن" },
            { title: "دراگون (Ender Dragon)", category: "ماب", desc: "باس فایت نهایی بازی.", emoji: "🐉", stat: "باس" },
            { title: "ویتر (Wither)", category: "ماب", desc: "باس خطرناک. ستاره ندر می‌دهد.", emoji: "💀", stat: "باس" },
            { title: "الماس (Diamond)", category: "آیتم", desc: "باارزش‌ترین سنگ معدن. برای بهترین ابزار و زره.", emoji: "💎", stat: "نادر" },
            { title: "ندرایت (Netherite)", category: "آیتم", desc: "قوی‌ترین ماده بازی. ارتقای الماس در ندر.", emoji: "⚔️", stat: "نهایی" },
            { title: "قلعه ندر (Nether Fortress)", category: "سازه", desc: "ساختار پل‌مانند در ندر. بلیز و اسکلتون ویتر.", emoji: "🏯", stat: "ندری" },
            { title: "شهر اند (End City)", category: "سازه", desc: "شهر شناور در اند. الکساندر و شولکرها.", emoji: "🏙️", stat: "اندر" }
        ];

        const postsPerPage = 6;
        let currentPage = 1;

        function loadPage(page) {
            currentPage = page;
            const start = (page - 1) * postsPerPage;
            const end = start + postsPerPage;
            const pagePosts = blogPosts.slice(start, end);
            
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = '';
            
            pagePosts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <div class="blog-image">${post.emoji}</div>
                    <div class="blog-content">
                        <span class="blog-category">${post.category}</span>
                        <h3>${post.title}</h3>
                        <p>${post.desc}</p>
                        <div class="blog-stats">
                            <span>⭐ ${post.stat}</span>
                            <span>📖 ${Math.floor(Math.random() * 5) + 1} دقیقه</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            const totalPages = Math.ceil(blogPosts.length / postsPerPage);
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.onclick = () => loadPage(i);
                if (i === currentPage) btn.style.background = 'rgba(85, 255, 255, 0.3)';
                paginationDiv.appendChild(btn);
            }
        }
        
        loadPage(1);
        
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                hamburger.classList.toggle('active');
            });
        }
        
        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                if (hamburger) hamburger.classList.remove('active');
            });
        });
    </script>

</body>
</html>
