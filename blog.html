    <script>
        const blogPosts = [
            // ========== 1. ماب‌ها (Mobs) - 20 پست ==========
            { title: "کریپر (Creeper)", category: "ماب", desc: "کریپر یکی از نمادین‌ترین ماب‌های ماینکرفت است که برخلاف بیشتر ماب‌ها، در نور خورشید نمی‌سوزد. این ماب سبز رنگ و بدون دست، بی‌صدا به سمت شما می‌آید و وقتی نزدیک شود، منفجر می‌شود. تنها صدایی که دارد صدای خش‌خش کردنش قبل از انفجار است. برای مقابله با کریپر، از کمان استفاده کنید تا از فاصله دور آن را بزنید. اگر کریپر توسط اسکلتون کشته شود، دیسک موسیقی (Music Disc) می‌اندازد که بسیار نادر است. همچنین اگر کریپر با صاعقه برخورد کند، به کریپر شارژ شده تبدیل می‌شود که انفجار قوی‌تری دارد. کریپرها از دست گربه‌ها فرار می‌کنند، پس با نگهداری گربه می‌توانید خود را از شر آنها خلاص کنید.", emoji: "💥", stat: "دشمن" },
            { title: "اندرمن (Enderman)", category: "ماب", desc: "اندرمن مابی بلند و سیاه با چشم‌های بنفش درخشان است که در بایوم‌های مختلف از جمله ندر و اند یافت می‌شود. این ماب معمولاً صلح‌جو است، اما اگر به چشم‌هایش نگاه کنید، عصبانی می‌شود و با سرعت بالا به شما حمله می‌کند. اندرمن‌ها می‌توانند بلوک‌هایی مثل شن، خاک و گل را بردارند و جابه‌جا کنند. برای شکست دادن آنها، بهتر است در آب بایستید چون اندرمن از آب آسیب می‌بیند. با کشتن اندرمن، اندرپیرل به دست می‌آورید که برای فعال کردن پورتال اند و ساخت اندرچست ضروری است.", emoji: "👾", stat: "خنثی/دشمن" },
            { title: "اسکلتون (Skeleton)", category: "ماب", desc: "اسکلتون‌ها ماب‌های تیراندازی هستند که در شب و مناطق تاریک ظاهر می‌شوند. آنها با کمان به شما شلیک می‌کنند و دقت بالایی دارند. اسکلتون‌ها در نور خورشید می‌سوزند، بنابراین بهترین زمان برای مقابله با آنها روز است. با کشتن اسکلتون، استخوان، تیر و گاهی زره و کمان به دست می‌آید. استخوان‌ها را می‌توانید به پودر استخوان تبدیل کنید و از آن برای رشد سریع گیاهان استفاده کنید. همچنین می‌توانید اسکلتون‌ها را اهلی کنید و از آنها به عنوان نگهبان استفاده کنید.", emoji: "🏹", stat: "دشمن" },
            { title: "زامبی (Zombie)", category: "ماب", desc: "زامبی‌ها رایج‌ترین ماب‌های دشمن در ماینکرفت هستند که در شب و مناطق تاریک ظاهر می‌شوند. آنها کند حرکت می‌کنند اما تعدادشان زیاد است و به روستاییان حمله می‌کنند. زامبی‌ها در نور خورشید می‌سوزند، اما می‌توانند کلاه و زره بپوشند. با کشتن زامبی، گوشت فاسد به دست می‌آید. زامبی‌ها می‌توانند درهای چوبی را بشکنند، پس بهتر است درهای خانه خود را از آهن بسازید.", emoji: "🧟", stat: "دشمن" },
            { title: "عنکبوت (Spider)", category: "ماب", desc: "عنکبوت‌ها ماب‌های هشت پا هستند که از دیوارها بالا می‌روند و در شب چشم‌هایشان قرمز می‌شود و تهاجمی می‌گردند. در روز، عنکبوت‌ها صلح‌جو هستند مگر اینکه به آنها حمله کنید. عنکبوت‌ها می‌توانند از حصارها و دیوارها عبور کنند، بنابراین برای محافظت از خانه خود باید سقف داشته باشید. با کشتن عنکبوت، نخ به دست می‌آید که برای ساخت کمان و تور ماهیگیری استفاده می‌شود.", emoji: "🕷️", stat: "دشمن" },
            { title: "جادوگر (Witch)", category: "ماب", desc: "جادوگرها ماب‌های دشمن هستند که در کلبه‌های مرداب زندگی می‌کنند. آنها از معجون‌های مختلف مثل معجون شفا، آسیب و ضعف استفاده می‌کنند. جادوگرها در برابر جادو مقاوم هستند و می‌توانند خود را درمان کنند. برای شکست دادن آنها، از حملات سریع و پی در پی استفاده کنید. با کشتن جادوگر، بطری شیشه‌ای، پودر گلو و معجون به دست می‌آید.", emoji: "🧙", stat: "دشمن" },
            { title: "اسلایم (Slime)", category: "ماب", desc: "اسلایم‌ها ماب‌های ژله‌ای هستند که در باتلاق‌ها و در زیر زمین در لایه‌های خاصی پیدا می‌شوند. آنها بر اساس اندازه به سه نوع بزرگ، متوسط و کوچک تقسیم می‌شوند. با کشتن اسلایم بزرگ، به چند اسلایم متوسط تقسیم می‌شود. اسلایم‌ها توپ اسلایم می‌دهند که برای ساخت پیستون چسبناک و قلاده استفاده می‌شود.", emoji: "🟢", stat: "دشمن" },
            { title: "بلیز (Blaze)", category: "ماب", desc: "بلیز یکی از ماب‌های ندر است که در قلعه‌های ندر و در کنار اسپانر بلیز پیدا می‌شود. آنها سه سر دارند و اطراف خود را با دود سفید پوشانده‌اند. بلیزها به شما توپ‌های آتشی شلیک می‌کنند. برای مقابله با آنها، از زره مقاوم در برابر آتش استفاده کنید یا آنها را با گلوله برفی بزنید. با کشتن بلیز، راود بلز به دست می‌آید.", emoji: "🔥", stat: "دشمن" },
            { title: "گست (Ghast)", category: "ماب", desc: "غول‌ها ماب‌های پرنده در ندر هستند که شبیه چتر دریایی غول‌پیکر هستند. آنها اشک می‌ریزند و صداهای غمگینی دارند. غول‌ها از دهان خود توپ‌های آتشی شلیک می‌کنند. با کشتن غول، گان پودر و غبار غول به دست می‌آید. غبار غول برای ساخت معجون شفا و احیا استفاده می‌شود.", emoji: "👻", stat: "دشمن" },
            { title: "اندر دراگون (Ender Dragon)", category: "ماب", desc: "دراگون اند، ماب نهایی و باس فایت اصلی ماینکرفت است که در بعد اند زندگی می‌کند. او بر روی قله‌های ابزیدین نشسته و با بال‌هایش به شما حمله می‌کند. برای شکست دادن دراگون، ابتدا باید کریستال‌های اند را نابود کنید تا دراگون شفا پیدا نکند. پس از شکست دراگون، تخم دراگون به عنوان جایزه ظاهر می‌شود.", emoji: "🐉", stat: "باس" },
            { title: "ویتر (Wither)", category: "ماب", desc: "ویتر، ماب باس اختیاری و بسیار قدرتمند است که شما می‌توانید آن را با ساختن تندیسی از شن‌های روح و سه جمجمه ویتر احضار کنید. ویتر سه سر دارد و به هر چیزی که حرکت کند حمله می‌کند. پس از شکست ویتر، ستاره ندر به دست می‌آید که برای ساخت بیکن استفاده می‌شود.", emoji: "💀", stat: "باس" },
            { title: "هاگلین (Hoglin)", category: "ماب", desc: "هاگلین‌ها ماب‌های بزرگ و شبیه به گراز هستند که در ندر زندگی می‌کنند. آنها تهاجمی هستند و به شما حمله می‌کنند. با کشتن هاگلین، گوشت خوک پخته و پوست به دست می‌آید. هاگلین‌ها از قارچ‌های کرم‌شده فرار می‌کنند، می‌توانید از این قارچ‌ها برای دور کردن آنها استفاده کنید.", emoji: "🐗", stat: "دشمن" },
            { title: "پیگلین (Piglin)", category: "ماب", desc: "پیگلین‌ها ماب‌های ندری هستند که به طلا حساس هستند. اگر زره طلا نپوشید، به شما حمله می‌کنند. می‌توانید با دادن شمش طلا به آنها معامله کنید و آیتم‌های ارزشمندی مثل اندرپیرل و پوتین جادویی دریافت کنید. پیگلین‌ها از زامبی‌پیگلین و قارچ‌های کرم‌شده فرار می‌کنند.", emoji: "🐷", stat: "خنثی" },
            { title: "زامبی پیگلین (Zombie Piglin)", category: "ماب", desc: "زامبی پیگلین‌ها ماب‌های ندری هستند که معمولاً صلح‌جو هستند، اما اگر به آنها حمله کنید، همه زامبی پیگلین‌های اطراف به شما حمله می‌کنند. آنها شمش طلا حمل می‌کنند و با کشتنشان شمش طلا و گوشت فاسد به دست می‌آید.", emoji: "🧟‍♂️", stat: "صلح‌جو" },
            { title: "ماگما کیوب (Magma Cube)", category: "ماب", desc: "ماگما کیوب‌ها نسخه ندری اسلایم‌ها هستند که در ندر و نزدیک قلعه‌های ندر پیدا می‌شوند. آنها با کشتن به ماگما کیوب‌های کوچک‌تر تقسیم می‌شوند و توپ ماگما می‌دهند. از توپ ماگما برای ساخت پاداش معجون مقاومت در برابر آتش استفاده می‌شود.", emoji: "🟠", stat: "دشمن" },
            { title: "شولکر (Shulker)", category: "ماب", desc: "شولکرها ماب‌هایی هستند که در شهرهای اند زندگی می‌کنند. آنها پوسته‌ای شبیه به صدف دارند و تیرهای هومینگ شلیک می‌کنند که شما را به هوا پرت می‌کند. با کشتن شولکر، پوسته شولکر به دست می‌آید که برای ساخت شولکر باکس استفاده می‌شود.", emoji: "🐚", stat: "دشمن" },
            { title: "گاردین (Guardian)", category: "ماب", desc: "گاردین‌ها ماب‌های محافظ معبدهای اقیانوسی هستند. آنها با اشعه لیزری به شما حمله می‌کنند. برای مقابله با آنها، می‌توانید از خارهای دریایی استفاده کنید. با کشتن گاردین، پریزمارین و خار دریایی به دست می‌آید.", emoji: "🐟", stat: "دشمن" },
            { title: "الدر گاردین (Elder Guardian)", category: "ماب", desc: "الدر گاردین نسخه بزرگ‌تر و قوی‌تر گاردین است که در معبدهای اقیانوسی قرار دارد. با کشتن الدر گاردین، اسفنج دریایی به دست می‌آید. همچنین شما را با اثر «خستگی معدن» (Mining Fatigue) نفرین می‌کند.", emoji: "🐠", stat: "باس" },
            { title: "وکس (Vex)", category: "ماب", desc: "وکس‌ها ماب‌های پرنده و کوچکی هستند که توسط ایلاگرها (Evoker) احضار می‌شوند. آنها از دیوارها عبور می‌کنند و با شمشیر به شما حمله می‌کنند. وکس‌ها بسیار سریع و خطرناک هستند.", emoji: "👿", stat: "دشمن" },
            { title: "راودجر (Ravager)", category: "ماب", desc: "راودجرها ماب‌های بزرگ و شبیه به بوفالو هستند که توسط ایلاگرها سوار می‌شوند و در حملات ییلاقی (Raid) ظاهر می‌شوند. آنها بسیار قدرتمند هستند و می‌توانند بلوک‌های محصولات زراعی را نابود کنند.", emoji: "🦬", stat: "دشمن" },
            
            // ========== 2. بایوم‌ها (Biomes) - 15 پست ==========
            { title: "جنگل تاریک (Dark Forest)", category: "بایوم", desc: "جنگل تاریک بایومی با درختان بزرگ و انبوه است که نور خورشید به راحتی به زمین نمی‌رسد. خانه ویچ‌ها و قارچ‌های غول‌پیکر است. همچنین عمارت بزرگ وودلند منشن در این بایوم قرار دارد. در این بایوم ممکن است گم شوید، حتماً مختصات خود را یادداشت کنید.", emoji: "🌲", stat: "خطرناک" },
            { title: "صحرا (Desert)", category: "بایوم", desc: "منطقه خشک و شنی که در آن باران نمی‌بارد. معبد صحرا و دهکده‌های صحرایی با خانه‌های شنی اینجا یافت می‌شوند. همچنین می‌توانید فسیل‌های بزرگ استخوانی را در زیر شن‌ها پیدا کنید. خارها و شترها در این بایوم زندگی می‌کنند.", emoji: "🏜️", stat: "گرم" },
            { title: "جنگل (Jungle)", category: "بایوم", desc: "جنگلی سرسبز و انبوه با درختان بائوباب بزرگ. طوطی‌های رنگارنگ، گوسفند و پانداها اینجا زندگی می‌کنند. همچنین معبد جنگلی با تله‌های پازلی در این بایوم یافت می‌شود. درختان بائوباب تا ۳۰ بلوک ارتفاع دارند.", emoji: "🌴", stat: "سبز" },
            { title: "تایگا (Taiga)", category: "بایوم", desc: "جنگل سردسیر با درختان صنوبر و برف. گرگ‌های اهلی‌شدنی، روباه‌ها و دهکده‌های تایگا با خانه‌های چوبی صنوبر اینجا یافت می‌شوند. همچنین می‌توانید انواع توت‌های شیرین را پیدا کنید.", emoji: "❄️", stat: "سرد" },
            { title: "یخ‌زده (Ice Spikes)", category: "بایوم", desc: "منطقه برفی با ستون‌های عظیم یخی که تا ارتفاع ۱۵ بلوک می‌رسند. این بایوم بسیار نادر است و منابع خاصی ندارد، اما برای ساخت سازه‌های یخی عالی است. در اینجا برف سنگین و کولاک وجود دارد.", emoji: "🧊", stat: "قطبی" },
            { title: "باتلاق (Swamp)", category: "بایوم", desc: "منطقه باتلاقی با درختان کج و آب کدر. اسلایم‌ها و کلبه ویچ با گلدان معجون در این بایوم پیدا می‌شوند. همچنین در شب، غارها و قورباغه‌ها در اینجا ظاهر می‌شوند. نیلوفر آبی نیز در آب این بایوم رشد می‌کند.", emoji: "🌾", stat: "مرطوب" },
            { title: "دشت (Plains)", category: "بایوم", desc: "دشت‌های باز و مسطح با علف‌های بلند. بهترین مکان برای ساخت دهکده و قلعه. اسب‌ها، الاغ‌ها و گله‌های گوسفند و گاو در اینجا زیاد هستند. ساخت خانه در این بایوم بسیار راحت است.", emoji: "🌿", stat: "معمولی" },
            { title: "تپه‌ها (Windswept Hills)", category: "بایوم", desc: "تپه‌های مرتفع و سنگی که گاهی به ابر می‌رسند. بزهای کوهی در اینجا زندگی می‌کنند و اگر به آنها شاخ بزنید ممکن است شما را از کوه پرت کنند. معادن آهن و زغال سنگ در این بایوم زیاد است.", emoji: "⛰️", stat: "کوهستانی" },
            { title: "اقیانوس (Ocean)", category: "بایوم", desc: "آب‌های بیکران که بیشتر سطح دنیای ماینکرفت را پوشانده است. دلفین‌ها، لاک‌پشت‌های دریایی و غرق‌شده‌ها در اینجا زندگی می‌کنند. معبدهای اقیانوسی و خرابه‌های زیرآبی نیز در اعماق آن یافت می‌شوند.", emoji: "🌊", stat: "آبی" },
            { title: "ندر (Nether)", category: "بایوم", desc: "بعد جهنم با دریای گدازه و موجودات خطرناک. بلیز، غول و پیگلین در اینجا زندگی می‌کنند. قلعه‌های ندر و باستین‌ها نیز در این بایوم قرار دارند. برای سفر در ندر، حتماً زره مقاوم در برابر آتش بپوشید.", emoji: "🔥", stat: "جهنمی" },
            { title: "اند (End)", category: "بایوم", desc: "بعد انتهایی با جزیره اصلی و جزایر دورافتاده. خانه دراگون اند، اندرمن‌ها و شولکرها. شهر اند با کشتی‌های حاوی الکساندر در جزایر دورافتاده قرار دارد. مراقب باشید از جزیره به بیرون نیفتید!", emoji: "🌌", stat: "نهایی" },
            { title: "قارچ (Mushroom Fields)", category: "بایوم", desc: "جزیره قارچی نادر و عجیب. موآشوم (گاو قارچی) در اینجا زندگی می‌کند و هیچ ماب دشمنی در این بایوم اسپاون نمی‌شود. برای ساخت پایگاه امن، این بایوم عالی است. قارچ‌های غول‌پیکر منبع غذایی نامحدود هستند.", emoji: "🍄", stat: "نادر" },
            { title: "بامبو (Bamboo Jungle)", category: "بایوم", desc: "نسخه نادرتر جنگل با درختان بامبو. پانداها در اینجا زندگی می‌کنند و منبع اصلی بامبو برای ساخت داربست هستند. همچنین می‌توانید پودر بامبو را برای ساخت بلوک‌های بامبو استفاده کنید.", emoji: "🎋", stat: "سبز" },
            { title: "برف (Snowy Tundra)", category: "بایوم", desc: "دشت برفی وسیع که در آن برف سنگین می‌بارد. یخ‌بندان، خانه یخی و ایگلوها در این بایوم یافت می‌شوند. خرس‌های قطبی و روباه‌های سفید در اینجا زندگی می‌کنند. برای ماندن در اینجا، لباس گرم بپوشید!", emoji: "❄️", stat: "قطبی" },
            
            // ========== 3. آیتم‌ها و بلوک‌ها (Items & Blocks) - 15 پست ==========
            { title: "الماس (Diamond)", category: "آیتم", desc: "الماس باارزش‌ترین و کمیاب‌ترین سنگ معدن در ماینکرفت است. شما می‌توانید الماس را در لایه‌های ۵ تا ۱۲ زیر زمین پیدا کنید. الماس برای ساخت بهترین ابزارها و زره‌ها استفاده می‌شود. همچنین می‌توانید از الماس برای ساخت میز افسون و جعبه موسیقی استفاده کنید. نکته: هرگز الماس را با کلنگ چوبی یا سنگی نکنید!", emoji: "💎", stat: "نادر" },
            { title: "ندرایت (Netherite)", category: "آیتم", desc: "ندرایت قوی‌ترین ماده موجود در ماینکرفت است. ابتدا ندرایت اسکرپ را از استخراج بلوک‌های باستانی در ندر به دست آورید، سپس با طلا ترکیب کنید تا شمش ندرایت بسازید. شمش ندرایت را در میز آهنگری با ابزار الماسی ترکیب کنید تا ارتقا یابند. ابزار ندرایت در آب غرق نمی‌شوند و از آتش آسیب نمی‌بینند.", emoji: "⚔️", stat: "نهایی" },
            { title: "الکساندر (Elytra)", category: "آیتم", desc: "الکساندر بال‌هایی برای پرواز است که در کشتی‌های شهر اند پیدا می‌شود. برای پرواز، الکساندر را در اسلات زره قرار دهید و از جای بلند بپرید. با استفاده از آتش بازی (Firework) می‌توانید در هوا اوج بگیرید. همچنین می‌توانید الکساندر را با کتاب افسون و سندان تعمیر کنید.", emoji: "🦅", stat: "پروازی" },
            { title: "آتش بازی (Firework)", category: "آیتم", desc: "آتش بازی از گان پودر و کاغذ ساخته می‌شود. با افزودن سرهای مختلف می‌توانید اشکال و رنگ‌های مختلف بسازید. آتش بازی در شب‌های جشن و همچنین برای شتاب گرفتن در هوا هنگام استفاده از الکساندر کاربرد دارد.", emoji: "🎆", stat: "آتشین" },
            { title: "بیکن (Beacon)", category: "آیتم", desc: "بیکن منبع نوری است که با ستاره ندر و سه بلوک ابزیدین ساخته می‌شود. پس از فعال کردن، می‌توانید به بازیکن افکت‌های ویژه مثل سرعت، قوت، پرش و شتاب بدهید. برای فعال کردن، نیاز به هرمی از بلوک‌های آهنی، طلایی، زمردی یا الماسی دارید.", emoji: "✨", stat: "افکتی" },
            { title: "اندردرخ (Ender Chest)", category: "آیتم", desc: "اندردرخ صندوقچه‌ای است که محتویاتش در همه جای جهان یکسان است. یعنی اگر در خانه خود چیزی در آن بگذارید، در معدن هم می‌توانید همان را بیرون بیاورید. برای ساخت به ابزیدین و چشم اندر نیاز دارید.", emoji: "📦", stat: "جادویی" },
            { title: "شولکر باکس (Shulker Box)", category: "آیتم", desc: "شولکر باکس یک صندوقچه قابل حمل است که با کشتن شولکرها و ترکیب پوسته آنها با یک صندوقچه ساخته می‌شود. می‌توانید وسایل خود را در شولکر باکس بگذارید و آن را درون صندوقچه‌های دیگر حمل کنید. این وسیله برای ماینرها و معدنچی‌ها ضروری است.", emoji: "📦", stat: "قابل حمل" },
            { title: "پیستون چسبناک (Sticky Piston)", category: "بلوک", desc: "پیستون چسبناک از یک پیستون معمولی و یک توپ اسلایم ساخته می‌شود. برخلاف پیستون معمولی، این پیستون می‌تواند بلوک‌ها را بچسباند و به عقب برگرداند. برای ساخت ماشین‌های مخفی و درهای خودکار استفاده می‌شود.", emoji: "🔄", stat: "مکانیکی" },
            { title: "نردبان (Ladder)", category: "بلوک", desc: "نردبان از ۷ عدد چوب ساخته می‌شود و برای بالا رفتن از دیوارها و معادن استفاده می‌شود. نردبان را می‌توانید پشت بلوک‌ها قرار دهید. این وسیله جان شما را از سقوط نجات می‌دهد.", emoji: "🪜", stat: "بالا رونده" },
            { title: "داربست (Scaffolding)", category: "بلوک", desc: "داربست از بامبو و نخ ساخته می‌شود. می‌توانید از آن برای ساختن سازه‌های موقت و بالا رفتن از برج‌ها استفاده کنید. داربست بسیار سبک است و به راحتی جمع می‌شود. اگر داربست زیرش خالی باشد، می‌افتد.", emoji: "🏗️", stat: "ساخت و ساز" },
            { title: "پله (Stairs)", category: "بلوک", desc: "پله‌ها بلوک‌های شیب‌داری هستند که از چوب، سنگ، آجر و مواد دیگر ساخته می‌شوند. برای ساخت پله‌ها، ۶ بلوک از ماده مورد نظر را در میز کار به شکل L قرار دهید. پله‌ها برای ساخت راه‌پله و سقف‌های شیب‌دار عالی هستند.", emoji: "🪜", stat: "معماری" },
            { title: "در آهنی (Iron Door)", category: "بلوک", desc: "در آهنی از شمش آهن ساخته می‌شود. برخلاف در چوبی، در آهنی را نمی‌توان با دست راست باز کرد و فقط با اهرم، پدال فشار، یا سیگنال رَداستون باز می‌شود. این در برای ساختن اتاق‌های مخفی و امن عالی است.", emoji: "🚪", stat: "امن" },
            { title: "کلنگ (Pickaxe)", category: "ابزار", desc: "کلنگ اصلی‌ترین ابزار برای استخراج سنگ و معادن است. هر چه کلنگ قوی‌تر باشد، سنگ‌های سخت‌تری می‌توانید استخراج کنید. کلنگ چوبی: سنگ، کلنگ سنگی: آهن، کلنگ آهنی: الماس، کلنگ الماسی: ندرایت و ابزیدین.", emoji: "⛏️", stat: "ابزار" },
            { title: "تابلو (Sign)", category: "بلوک", desc: "تابلو از ۶ عدد چوب و یک چوب دستی ساخته می‌شود. می‌توانید روی تابلو متن بنویسید و آن را روی دیوار یا زمین قرار دهید. برای نامگذاری اتاق‌ها، اخطارها یا تزئینات استفاده می‌شود.", emoji: "📝", stat: "نوشتاری" },
            
            // ========== 4. سازه‌ها (Structures) - 10 پست ==========
            { title: "قلعه ندر (Nether Fortress)", category: "سازه", desc: "قلعه ندر یکی از مهم‌ترین سازه‌های ندر است که شبیه به پل‌های عظیم و اتاق‌های باریک طراحی شده. درون قلعه، اسپانر بلیز وجود دارد که منبع اصلی راود بلز است. همچنین اسکلتون‌های ویتر در اینجا زندگی می‌کنند. داخل صندوقچه‌ها می‌توانید آیتم‌های نادر پیدا کنید.", emoji: "🏯", stat: "ندری" },
            { title: "شهر اند (End City)", category: "سازه", desc: "شهر اند یکی از سازه‌های جذاب و خطرناک بعد اند است. شولکرها در اینجا زندگی می‌کنند. در کشتی‌های اند، الکساندر و سر دراگون قرار دارد. حواستان به پرت شدن توسط شولکرها باشد.", emoji: "🏙️", stat: "اندر" },
            { title: "معبد صحرا (Desert Temple)", category: "سازه", desc: "هرم صحرایی با تله TNT و صندوقچه پنهان در زیر زمین. برای وارد شدن، به جای شکستن بلوک مرکزی، از کنار وارد شوید و صندوقچه‌ها را خالی کنید. مراقب باشید منفجر نشوید!", emoji: "🛕", stat: "تله‌دار" },
            { title: "معبد جنگلی (Jungle Temple)", category: "سازه", desc: "ساختار سنگی در جنگل با پازل و تله. با حل پازل اهرم‌ها، می‌توانید در مخفی را باز کنید و به صندوقچه‌ها برسید. مراقب تیرهای پشت در باشید.", emoji: "🏛️", stat: "پازلی" },
            { title: "وودلند منشن (Woodland Mansion)", category: "سازه", desc: "عمارت بزرگ و ترسناک در جنگل تاریک. پر از ایلاگرها، ویندیکیتورها و وکس‌ها. درون عمارت صندوقچه‌های پر از غنایم نادر مثل کتاب افسون و زره وجود دارد. همچنین اتاق پورتال مخفی نیز در آن وجود دارد.", emoji: "🏰", stat: "خطرناک" },
            { title: "معبد اقیانوسی (Ocean Monument)", category: "سازه", desc: "ساختار زیر آبی ساخته شده از پریزمارین. گاردین‌ها و الدر گاردین‌ها در اینجا زندگی می‌کنند. برای ورود، به معجون تنفس زیر آب و مقاومت در برابر آتش نیاز دارید. اسفنج دریایی درون معبد قابل استخراج است.", emoji: "🌊", stat: "آبی" },
            { title: "روستا (Village)", category: "سازه", desc: "محل زندگی روستاییان. می‌توانید با آنها تجارت کنید و آیتم‌های نادر بخرید. همچنین می‌توانید با ساخت خانه‌های جدید، جمعیت روستا را افزایش دهید. روستاها در بایوم‌های دشت، صحرا، تایگا و ساوانا یافت می‌شوند.", emoji: "🏘️", stat: "آرام" },
            { title: "باستیون (Bastion Remnant)", category: "سازه", desc: "ساختار بزرگ در ندر که پر از پیگلین‌ها و غنایم باارزش است. درون باستین می‌توانید شمش طلا، ندرایت اسکرپ و حتی الکساندر پیدا کنید. اما مراقب پیگلین‌های خشمگین باشید!", emoji: "🏰", stat: "ندری" },
            { title: "ایگلو (Igloo)", category: "سازه", desc: "ساختار برفی در بایوم‌های یخی. زیر فرش آن، یک زامبی روستایی و صندوقچه پنهان است. می‌توانید زامبی روستایی را با سیب طلایی و معجون ضعف درمان کنید و به یک روستایی عادی تبدیل کنید.", emoji: "🏠", stat: "پنهان" },
            { title: "قلعه (Stronghold)", category: "سازه", desc: "ساختار زیرزمینی که پورتال اند در آن قرار دارد. برای فعال کردن پورتال، به ۱۲ چشم اندر نیاز دارید. قلعه‌ها در زیر روستاها و در لایه‌های زیرزمینی قرار دارند و می‌توان آنها را با چشم اندر پیدا کرد.", emoji: "🏰", stat: "نهایی" }
        ];

        const postsPerPage = 12;
        let currentPage = 1;

        function loadPage(page) {
            currentPage = page;
            const start = (page - 1) * postsPerPage;
            const end = start + postsPerPage;
            const pagePosts = blogPosts.slice(start, end);
            
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = '';
            
            pagePosts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <div class="blog-image">${post.emoji}</div>
                    <div class="blog-content">
                        <span class="blog-category">${post.category}</span>
                        <h3>${post.title}</h3>
                        <p>${post.desc}</p>
                        <div class="blog-stats">
                            <span>⭐ ${post.stat}</span>
                            <span>📖 ${Math.ceil(post.desc.length / 1000)} دقیقه مطالعه</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            const totalPages = Math.ceil(blogPosts.length / postsPerPage);
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.onclick = () => loadPage(i);
                if (i === currentPage) btn.style.background = 'rgba(85, 255, 255, 0.3)';
                paginationDiv.appendChild(btn);
            }
        }
        
        loadPage(1);
        
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                hamburger.classList.toggle('active');
            });
        }
        
        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                if (hamburger) hamburger.classList.remove('active');
            });
        });
    </script>

</body>
</html>
