name: پشتیبان‌گیری خودکار و ارسال به بله

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کدهای مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: بسته‌بندی فایل‌ها
        run: |
          git bundle create backup.bundle --all

      - name: ارسال به بات بله
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          curl -s -X POST "https://tapi.bale.ai/bot$BALE_TOKEN/sendDocument" \
            -F "chat_id=$CHAT_ID" \
            -F "document=@backup.bundle"
