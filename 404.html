<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه پیدا نشد | دایمند ماین</title>
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/Not-Found4/DiamondMine@main/images/ii.png">
    <link rel="stylesheet" href="Main.css">
    <style>
        .error-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            padding: 100px 20px;
            position: relative;
            z-index: 5;
            text-align: center;
        }
        .error-section h1 {
            font-size: 72px;
            color: rgb(85, 255, 255);
            text-shadow: 0 0 20px rgba(85,255,255,0.3);
        }
        .error-section h2 {
            color: #cccccc;
            font-size: 28px;
            margin: 20px 0;
        }
        .error-section p {
            color: #888888;
            font-size: 16px;
            max-width: 500px;
        }
        .error-section .nav-btn {
            margin-top: 30px;
            display: inline-block;
            padding: 12px 30px;
            background: rgba(85, 255, 255, 0.15);
            border: 1px solid rgba(85, 255, 255, 0.4);
            border-radius: 40px;
            color: rgb(85, 255, 255);
            text-decoration: none;
            transition: all 0.2s;
        }
        .error-section .nav-btn:hover {
            background: rgba(85, 255, 255, 0.3);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="bg-tilt" id="bgTilt"></div>
    <div class="blur-overlay"></div>

    <header>
        <div class="logo-area">
            <img src="https://cdn.jsdelivr.net/gh/Not-Found4/DiamondMine@main/images/ii.png" alt="لوگو">
            <div class="logo-text">
                <div class="en">DiamondMine</div>
                <div class="fa">دایمند ماین</div>
            </div>
        </div>
    </header>

    <div class="error-section">
        <h1>💎 ۴۰۴</h1>
        <h2>صفحه پیدا نشد!</h2>
        <p>متأسفیم، صفحه‌ای که دنبالش هستید وجود ندارد یا جابه‌جا شده است.</p>
        <a href="index.html" class="nav-btn">🏠 بازگشت به خانه</a>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="https://cdn.jsdelivr.net/gh/Not-Found4/DiamondMine@main/images/ii.png" alt="لوگو">
                <div class="logo-text">
                    <div class="en">DiamondMine</div>
                    <div class="fa">دایمند ماین</div>
                </div>
            </div>
            <div class="footer-social">
                <a href="#" target="_blank" rel="noopener noreferrer">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 6L19 4H5L4 6V18L5 20H19L20 18V6Z" stroke="#55FFFF" stroke-width="1.5" fill="none"/>
                        <circle cx="9" cy="12" r="1.5" fill="#55FFFF"/>
                        <circle cx="15" cy="12" r="1.5" fill="#55FFFF"/>
                        <path d="M8 8L10 10" stroke="#55FFFF" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M16 8L14 10" stroke="#55FFFF" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M8 16L12 14L16 16" stroke="#55FFFF" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </a>
            </div>
        </div>
        <div class="footer-copyright">
            © 2026 DiamondMine | تمامی حقوق محفوظ است
        </div>
    </footer>

</body>
</html>
