<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | کریپر رفت!</title>
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/Not-Found4/DiamondMine@main/images/ii.png">
    <link rel="stylesheet" href="Main.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
        }

        .wrapper {
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .creeper-area {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        /* ---------- کریپر ---------- */
        .creeper {
            width: 140px;
            height: 180px;
            background: #3a7a3a;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 0 30px rgba(0,255,0,0.1);
            transition: all 0.3s;
            margin: 0 auto;
        }

        /* سر کریپر */
        .creeper-head {
            width: 100%;
            height: 100%;
            background: #3a7a3a;
            border-radius: 10px;
            position: relative;
            border: 3px solid #1e4a1e;
        }

        /* چشم‌ها (حالت نگاه به چپ) */
        .eye {
            position: absolute;
            width: 22px;
            height: 28px;
            background: #111;
            border-radius: 4px;
            top: 30px;
            overflow: hidden;
        }
        .eye::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #55FFFF;
            border-radius: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .eye-left {
            left: 18px;
        }
        .eye-right {
            right: 18px;
        }

        /* مردمک‌ها برای نگاه به چپ */
        .eye-left::after {
            transform: translate(-80%, -50%);
        }
        .eye-right::after {
            transform: translate(-80%, -50%);
        }

        /* دهان کریپر (مربع‌های خالی) */
        .mouth {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .mouth span {
            width: 14px;
            height: 14px;
            background: #111;
            border-radius: 2px;
        }

        /* ---------- افکت انفجار (پیکسلی) ---------- */
        .explosion {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: none;
        }

        .explosion.active {
            opacity: 1;
        }

        .pixel {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ffaa00;
            border-radius: 2px;
            box-shadow: 0 0 6px #ff8800;
            animation: explode 0.7s ease-out forwards;
        }

        @keyframes explode {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(180deg);
            }
        }

        /* ---------- دکمه‌ها ---------- */
        .error-title {
            font-size: 72px;
            color: #55FFFF;
            text-shadow: 0 0 20px rgba(85,255,255,0.4);
            margin: 10px 0 5px;
        }

        .error-sub {
            color: #ccc;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .error-desc {
            color: #888;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-404 {
            padding: 10px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 15px;
            background: rgba(85,255,255,0.08);
            border: 1px solid rgba(85,255,255,0.3);
            color: #55FFFF;
            transition: 0.2s;
            font-family: inherit;
            cursor: pointer;
        }

        .btn-404:hover {
            background: rgba(85,255,255,0.2);
            transform: scale(1.03);
        }

        .btn-404-outline {
            border-color: rgba(255,255,255,0.15);
            color: #aaa;
        }

        .btn-404-outline:hover {
            border-color: rgba(255,255,255,0.4);
            color: #fff;
        }

        .btn-explode {
            background: rgba(255,80,80,0.15);
            border-color: rgba(255,80,80,0.4);
            color: #ff6666;
        }

        .btn-explode:hover {
            background: rgba(255,80,80,0.3);
        }

        /* ---------- موبایل ---------- */
        @media (max-width: 600px) {
            .creeper {
                width: 110px;
                height: 140px;
            }
            .eye {
                width: 18px;
                height: 22px;
                top: 22px;
            }
            .eye::after {
                width: 8px;
                height: 8px;
            }
            .eye-left {
                left: 14px;
            }
            .eye-right {
                right: 14px;
            }
            .mouth {
                gap: 4px;
                bottom: 20px;
            }
            .mouth span {
                width: 10px;
                height: 10px;
            }
            .error-title {
                font-size: 48px;
            }
            .pixel {
                width: 8px;
                height: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-tilt"></div>
    <div class="blur-overlay"></div>

    <div class="wrapper">

        <!-- کریپر + انفجار -->
        <div class="creeper-area">
            <div class="creeper" id="creeper">
                <div class="creeper-head">
                    <div class="eye eye-left"></div>
                    <div class="eye eye-right"></div>
                    <div class="mouth">
                        <span></span><span></span><span></span><span></span>
                    </div>
                </div>
            </div>
            <div class="explosion" id="explosion"></div>
        </div>

        <div class="error-title">۴۰۴</div>
        <div class="error-sub">💥 کریپر رفت!</div>
        <div class="error-desc">
            انگار یه کریپر این صفحه رو منفجر کرده.  
            برو به خونه یا بلاگ، اونجا امن‌تره.
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn-404">🏠 خونه</a>
            <a href="blog.html" class="btn-404 btn-404-outline">📖 وبلاگ</a>
            <button class="btn-404 btn-explode" id="explodeBtn">💥 بزن ترکوندنش!</button>
        </div>

    </div>

    <script>
        const creeper = document.getElementById('creeper');
        const explosion = document.getElementById('explosion');
        const btn = document.getElementById('explodeBtn');

        function explodeCreeper() {
            // پاک کردن انفجار قبلی
            explosion.innerHTML = '';
            explosion.classList.remove('active');

            // ایجاد 50 تا پیکسل با رنگ‌های مختلف
            const colors = ['#ffaa00', '#ff8800', '#ff4400', '#ffee00', '#ffcc00', '#55FF55', '#FFFFFF'];
            const count = 50;

            for (let i = 0; i < count; i++) {
                const pixel = document.createElement('div');
                pixel.className = 'pixel';
                const angle = Math.random() * 360;
                const distance = 80 + Math.random() * 180;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 40;
                pixel.style.setProperty('--tx', tx + 'px');
                pixel.style.setProperty('--ty', ty + 'px');
                pixel.style.background = colors[Math.floor(Math.random() * colors.length)];
                pixel.style.left = (40 + Math.random() * 50) + '%';
                pixel.style.top = (30 + Math.random() * 40) + '%';
                pixel.style.width = (8 + Math.random() * 12) + 'px';
                pixel.style.height = pixel.style.width;
                pixel.style.animationDuration = (0.5 + Math.random() * 0.6) + 's';
                explosion.appendChild(pixel);
            }

            explosion.classList.add('active');

            // کریپر محو بشه
            creeper.style.transition = 'opacity 0.3s';
            creeper.style.opacity = '0.2';

            // بعد از انفجار، کریپر دوباره برگرده
            setTimeout(() => {
                explosion.classList.remove('active');
                creeper.style.opacity = '1';
            }, 1200);
        }

        btn.addEventListener('click', explodeCreeper);

        // انفجار خودکار یک بار برای خوش‌آمدگویی
        setTimeout(explodeCreeper, 500);
    </script>

</body>
</html>
