<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>۴۰۴ | دایمند ماین</title>
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/Not-Found4/DiamondMine@main/images/ii.png">
    <link rel="stylesheet" href="Main.css">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .bg-tilt {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(85, 255, 255, 0.04) 0%, transparent 70%);
            z-index: -1;
        }

        /* ===== کانتینر اصلی ===== */
        .error-wrapper {
            text-align: center;
            max-width: 600px;
            position: relative;
            z-index: 5;
            animation: fadeUp 1s ease-out forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== آیکون اصلی (الماس خردشده) ===== */
        .icon-box {
            font-size: 80px;
            display: inline-block;
            margin-bottom: 20px;
            animation: floatIcon 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(85, 255, 255, 0.15));
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.03); }
        }

        /* ===== تیتر ===== */
        .code {
            font-size: 100px;
            font-weight: 800;
            letter-spacing: -4px;
            background: linear-gradient(135deg, #55FFFF, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 8px;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .desc {
            color: #999;
            font-size: 16px;
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto 35px;
        }

        /* ===== دکمه‌ها ===== */
        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-404 {
            padding: 12px 30px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            background: rgba(85, 255, 255, 0.08);
            color: #55FFFF;
            border: 1px solid rgba(85, 255, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        .btn-404:hover {
            background: rgba(85, 255, 255, 0.18);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(85, 255, 255, 0.12);
            border-color: rgba(85, 255, 255, 0.4);
        }

        .btn-404-primary {
            background: rgba(85, 255, 255, 0.15);
            border-color: rgba(85, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(85, 255, 255, 0.05);
        }

        .btn-404-primary:hover {
            background: rgba(85, 255, 255, 0.25);
            box-shadow: 0 8px 35px rgba(85, 255, 255, 0.2);
        }

        .btn-404-outline {
            color: #aaa;
            border-color: rgba(255,255,255,0.08);
            background: transparent;
        }

        .btn-404-outline:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.03);
        }

        /* ===== خط تزئینی پایین ===== */
        .line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(85, 255, 255, 0.3), transparent);
            margin: 40px auto 10px;
            border-radius: 2px;
        }

        .footer-text {
            color: #333;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* ===== ریسپانسیو ===== */
        @media (max-width: 600px) {
            .code { font-size: 64px; }
            .icon-box { font-size: 56px; }
            .title { font-size: 22px; }
            .desc { font-size: 14px; padding: 0 10px; }
            .btn-404 { padding: 10px 22px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="bg-tilt"></div>

    <div class="error-wrapper">
        <!-- آیکون -->
        <div class="icon-box">💎</div>

        <!-- کد خطا -->
        <div class="code">۴۰۴</div>

        <!-- عنوان -->
        <div class="title">صفحه پیدا نشد</div>

        <!-- توضیح -->
        <div class="desc">
            به نظر می‌رسه این صفحه یا جابه‌جا شده، یا اصلاً وجود نداره.<br>
            بیا برگردیم به جای امن‌تر.
        </div>

        <!-- دکمه‌ها -->
        <div class="btn-group">
            <a href="index.html" class="btn-404 btn-404-primary"><svg width="20" height="20" style="display:inline-block; vertical-align:middle; margin-left:6px;">
                    <use href="./images/icons.svg#icon-home"/>
                </svg>
                 صفحه اصلی
            </a>
        </div>

        <!-- خط تزئینی -->
        <div class="line"></div>
        <div class="footer-text">دایمند ماین • ۲۰۲۶</div>
    </div>

</body>
</html>
